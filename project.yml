name: Ferry
options:
  bundleIdPrefix: com.ferry
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
targets:
  Ferry:
    type: application
    platform: macOS
    sources:
      - Ferry
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ferry.app
        PRODUCT_NAME: Ferry
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
        ENABLE_APP_SANDBOX: false
        SWIFT_EMIT_LOC_STRINGS: true
